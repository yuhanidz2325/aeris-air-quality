version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aeris_backend
    restart: unless-stopped
    env_file:
      - docker-compose.env
    volumes:
      - ./models:/app/models
      - ./reports:/app/reports
    ports:
      - "8000:8000"
    networks:
      - aeris_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aeris_frontend
    restart: unless-stopped
    ports:
      - "8888:80"
    depends_on:
      - backend
    networks:
      - aeris_network

networks:
  aeris_network:
    driver: bridge