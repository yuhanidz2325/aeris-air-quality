version: "3.9"
services:
  db:
    image: postgres:15-alpine
    container_name: aeris_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: aeris_air_quality
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database_schema.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    networks:
      - aeris_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: yuhanidz/aeris-backend:latest
    container_name: aeris_backend
    restart: unless-stopped
    env_file:
      - docker-compose.env
    volumes:
      - ./models:/app/models
      - ./reports:/app/reports
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      db:
        condition: service_healthy
    networks:
      - aeris_network
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000

  frontend:
    image: yuhanidz/aeris-frontend:latest
    container_name: aeris_frontend
    restart: unless-stopped
    ports:
      - "8888:80"
    depends_on:
      - backend
    networks:
      - aeris_network

volumes:
  postgres_data:

networks:
  aeris_network:
    driver: bridge