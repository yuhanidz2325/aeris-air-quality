version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aeris_backend
    restart: unless-stopped
    env_file:
      - docker-compose.env
    volumes:
      - ./models:/app/models
      - ./reports:/app/reports
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - aeris_network
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aeris_frontend
    restart: unless-stopped
    ports:
      - "8888:80"
    depends_on:
      - backend
    networks:
      - aeris_network

networks:
  aeris_network:
    driver: bridge